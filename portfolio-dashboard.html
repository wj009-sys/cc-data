<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500万资产配置组合 — 投资仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
</script>
<style>
:root {
  --bg-deep: #060b14;
  --bg-primary: #0b1222;
  --bg-card: #111827;
  --bg-card-hover: #161f33;
  --border: #1e2d4a;
  --border-light: #263554;
  --gold: #c9a96e;
  --gold-light: #d4bc8a;
  --gold-dark: #a68b4e;
  --text-primary: #e8ecf2;
  --text-secondary: #8899b4;
  --text-muted: #5a6d86;
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.1);
  --radius: 12px;
  --radius-lg: 20px;
  --shadow-lg: 0 25px 60px rgba(0,0,0,0.5);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'Display';
  src: local('Georgia'), local('Times New Roman');
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
  background:
    radial-gradient(ellipse 800px 600px at 15% 20%, rgba(201,169,110,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 600px 800px at 85% 75%, rgba(96,165,250,0.03) 0%, transparent 50%),
    radial-gradient(ellipse 500px 500px at 50% 50%, rgba(52,211,153,0.02) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

.header { padding: 32px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 32px; position: relative; }
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.logo-area { display: flex; align-items: center; gap: 14px; }
.logo-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 8px 24px rgba(201,169,110,0.25); }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary); }
.page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.date-badge { font-size: 12px; padding: 6px 14px; border-radius: 20px; background: rgba(201,169,110,0.1); color: var(--gold-light); border: 1px solid rgba(201,169,110,0.2); white-space: nowrap; }

.refresh-btn {
  font-size: 11px; padding: 6px 14px; border-radius: 20px;
  background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid rgba(96,165,250,0.25);
  cursor: pointer; transition: var(--transition); white-space: nowrap; margin-left: 8px;
}
.refresh-btn:hover { background: rgba(96,165,250,0.2); border-color: rgba(96,165,250,0.4); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.refresh-btn.spinning .btn-icon { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; position: relative; overflow: hidden; transition: var(--transition); }
.stat-card:hover { border-color: var(--border-light); transform: translateY(-1px); box-shadow: var(--shadow-card); }
.stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 4px 0 0 4px; }
.stat-card.total::after { background: var(--gold); }
.stat-card.equity::after { background: var(--blue); }
.stat-card.fixed::after { background: var(--green); }
.stat-card.cash::after { background: var(--amber); }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; font-family: 'Display', 'Georgia', serif; }
.stat-value.gold { color: var(--gold-light); }
.stat-value.blue { color: var(--blue); }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-change { font-size: 13px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }

.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; position: relative; transition: var(--transition); }
.chart-card:hover { border-color: var(--border-light); }
.chart-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.chart-title::before { content: ''; width: 8px; height: 8px; border-radius: 2px; background: var(--gold); }
.chart-wrap { position: relative; height: 300px; }
.chart-wrap canvas { width: 100% !important; height: 100% !important; }

.section { margin-bottom: 28px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-header h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
.section-header .indicator { width: 6px; height: 24px; border-radius: 3px; background: var(--gold); }

.table-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1100px; }
thead th { background: rgba(0,0,0,0.3); padding: 14px 12px; text-align: left; font-weight: 600; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; border-bottom: 2px solid var(--border); }
tbody td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); white-space: nowrap; }
tbody tr { transition: var(--transition); }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom: none; }
.asset-code { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; font-size: 12px; padding: 3px 8px; border-radius: 4px; background: rgba(201,169,110,0.1); color: var(--gold-light); }
.asset-name { font-weight: 600; color: var(--text-primary); }
.pnl-positive { color: var(--green); font-weight: 600; }
.pnl-negative { color: var(--red); font-weight: 600; }
.deviation-bar { display: inline-flex; align-items: center; gap: 8px; min-width: 100px; }
.deviation-track { width: 60px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
.deviation-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.deviation-fill.over { background: var(--blue); }
.deviation-fill.under { background: var(--amber); }
.deviation-fill.warn { background: var(--red); }

.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.badge-warn { background: var(--amber-bg); color: var(--amber); }
.badge-danger { background: var(--red-bg); color: var(--red); }
.badge-ok { background: var(--green-bg); color: var(--green); }
.badge-info { background: var(--blue-bg); color: var(--blue); }
.badge-pending { background: rgba(148,163,184,0.1); color: var(--text-muted); }

.discipline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.disc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 22px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
.disc-card:hover { border-color: var(--border-light); background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: var(--shadow-card); }
.disc-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0; transition: opacity 0.3s; }
.disc-card:hover::before { opacity: 1; }
.disc-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.disc-card-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.disc-card-icon.gold { background: rgba(201,169,110,0.15); }
.disc-card-icon.red { background: rgba(248,113,113,0.15); }
.disc-card-icon.blue { background: rgba(96,165,250,0.15); }
.disc-card-icon.green { background: rgba(52,211,153,0.15); }
.disc-card-icon.amber { background: rgba(251,191,36,0.15); }
.disc-card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.disc-card-body { font-size: 12px; color: var(--text-secondary); line-height: 1.8; }
.disc-card-body .rule-row { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
.disc-card-body .rule-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
.disc-card-body .rule-dot.gold-dot { background: var(--gold); }
.disc-card-body .rule-dot.red-dot { background: var(--red); }
.disc-card-body .rule-dot.green-dot { background: var(--green); }
.disc-card-body .rule-dot.amber-dot { background: var(--amber); }
.disc-card-body .rule-dot.blue-dot { background: var(--blue); }
.disc-card-body .highlight { color: var(--gold-light); font-weight: 600; }

.txn-list { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.txn-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.txn-table thead th { background: rgba(0,0,0,0.3); padding: 13px 16px; text-align: left; font-weight: 600; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 2px solid var(--border); white-space: nowrap; }
.txn-table thead th:last-child { text-align: right; }
.txn-table thead th:nth-child(4) { text-align: right; }
.txn-table thead th:nth-child(5) { text-align: center; }
.txn-table tbody td { padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); white-space: nowrap; vertical-align: middle; }
.txn-table tbody tr { transition: var(--transition); }
.txn-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.txn-table tbody tr:last-child td { border-bottom: none; }
.txn-date { color: var(--text-muted); }
.txn-code-td { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; font-size: 12px; padding: 3px 8px; border-radius: 4px; background: rgba(201,169,110,0.08); color: var(--gold-light); display: inline-block; }
.txn-name-td { font-weight: 600; }
.txn-price { color: var(--text-secondary); font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; font-size: 12px; }
.txn-qty { text-align: center; font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; font-size: 13px; color: var(--text-primary); }
.txn-amount-td { text-align: right; font-weight: 700; font-size: 14px; font-family: 'Display', 'Georgia', serif; color: var(--text-primary); }
.txn-row-badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
.txn-row-badge.buy { background: var(--red); }
.txn-row-badge.sell { background: var(--green); }

.txn-summary { background: rgba(201,169,110,0.04); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: flex-end; gap: 24px; font-size: 13px; color: var(--text-secondary); }
.txn-summary strong { color: var(--gold-light); font-size: 16px; font-family: 'Display', 'Georgia', serif; }

.status-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
  font-size: 12px; color: var(--text-muted);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.stale { background: var(--amber); }
.status-dot.error { background: var(--red); }

.footer { text-align: center; padding: 32px 0; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 32px; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.animate-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }

@media (max-width: 1024px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .discipline-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
}
@media (max-width: 640px) {
  .stats-row { grid-template-columns: 1fr; }
  .stat-value { font-size: 22px; }
  .header-top { flex-direction: column; align-items: flex-start; }
  .container { padding: 0 12px; }
}

/* Loading overlay */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: loadingBar 1.5s ease-in-out infinite;
  display: none;
}
.loading-overlay.active { display: block; }
@keyframes loadingBar {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
</style>
</head>

      <tbody id="positionsBody"></tbody>
    </table>
  </div></div>
</div>

<!-- Investment Discipline -->
<div class="section animate-in" style="animation-delay:0.5s">
  <div class="section-header"><div class="indicator"></div><h2>投资纪律速查</h2></div>
  <div class="discipline-grid" id="disciplineGrid"></div>
</div>

<!-- Transaction History -->
<div class="section animate-in" style="animation-delay:0.6s">
  <div class="section-header"><div class="indicator"></div><h2>近期交易流水</h2></div>
  <div class="txn-list">
    <table class="txn-table">
      <thead><tr><th>日期</th><th>代码</th><th>名称</th><th>单价</th><th style="text-align:center">数量</th><th style="text-align:right">成交金额</th></tr></thead>
      <tbody id="txnBody"></tbody>
    </table>
    <div class="txn-summary" id="txnSummary"></div>
  </div>
</div>

<!-- Daily P&L Chart -->
<div class="section animate-in" style="animation-delay:0.65s">
  <div class="section-header"><div class="indicator"></div><h2>每日盈亏走势</h2></div>
  <div class="chart-card" style="margin-bottom:0">
    <div style="display:flex;align-items:center;gap:24px;margin-bottom:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)">
        <span style="width:10px;height:10px;border-radius:2px;background:rgba(96,165,250,0.7)"></span> 每日浮动盈亏变化
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)">
        <span style="width:20px;height:2px;border-radius:1px;background:var(--gold)"></span> 累计盈亏曲线
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-left:auto" id="pnlDateRange">数据区间：加载中...</div>
    </div>
    <div class="chart-wrap" style="height:360px"><canvas id="dailyPnlChart"></canvas></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <p>⚠️ 投资有风险，本页面仅供记录参考，不构成投资建议 · 数据加载中...</p>
</footer>

</div>

// ============================================================
function fmt(v, d) { return v != null ? Number(v).toLocaleString('zh-CN', {minimumFractionDigits:d, maximumFractionDigits:d}) : '—'; }
function fmtPct(v) { return v != null ? (v >= 0 ? '+' : '') + v.toFixed(2) + '%' : '—'; }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function getSecId(code) {
  var c = String(code);
  if (c.startsWith('5') || c.startsWith('6') || c.startsWith('9')) return '1.' + c;
  if (c.startsWith('0') || c.startsWith('1') || c.startsWith('2') || c.startsWith('3')) return '0.' + c;
  return '1.' + c;
}

// ============================================================
//  MARKET DATA API
// ============================================================
function fetchPrices(codes) {
  var secids = codes.map(getSecId).join(',');
  var url = 'https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&fields=f2,f3,f4,f12,f14&secids=' + secids + '&_=' + Date.now();
  return fetch(url, { cache: 'no-cache' })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    })
    .then(function(json) {
      if (!json || !json.data || !json.data.diff) throw new Error('API format error');
      var map = {};
      json.data.diff.forEach(function(d) {
        map[d.f12] = {
          price: d.f2 != null ? Number(d.f2) : null,
          changePct: d.f3 != null ? Number(d.f3) : null,
          changeAmt: d.f4 != null ? Number(d.f4) : null,
          name: d.f14
        };
      });
      return map;
    })
    .catch(function(err) {
      console.warn('行情获取失败，使用缓存:', err.message);
      return null;
    });
}

//  CALCULATIONS
// ============================================================
function buildPositions(prices) {
  return basePositions.map(function(bp) {
    var quote = (prices && prices[bp.code]) ? prices[bp.code] : null;
    var close = (quote && quote.price != null) ? quote.price : (bp.costPrice || 0);
    var changePct = quote ? quote.changePct : null;
    var marketValue = bp.qty > 0 ? Math.round(bp.qty * close) : 0;
    var pnl = bp.costPrice && bp.qty > 0 ? Math.round((close - bp.costPrice) * bp.qty) : 0;
    var pnlRate = bp.costPrice && bp.qty > 0 ? (close - bp.costPrice) / bp.costPrice * 100 : null;
    return {
      code: bp.code, name: bp.name, targetWeight: bp.targetWeight,
      costPrice: bp.costPrice, qty: bp.qty, cost: bp.cost,
      cat: bp.cat, catColor: bp.catColor,
      close: close, changePct: changePct,
      marketValue: marketValue, pnl: pnl, pnlRate: pnlRate
    };
  });
}

function addWeightInfo(positions) {
  var totalMv = positions.reduce(function(s, p) { return s + p.marketValue; }, 0);
  return positions.map(function(p) {
    var currentWeight = totalMv > 0 ? (p.marketValue / totalMv * 100) : 0;
    var deviation = currentWeight - p.targetWeight;
    var absDev = Math.abs(deviation);
    var status, statusText;
    if (p.qty === 0) { status = 'pending'; statusText = '⏳ 待建仓'; }
    else if (p.pnlRate != null && p.pnlRate <= -10) { status = 'danger'; statusText = '⚡ 浮亏预警'; }
    else if (absDev >= 7) { status = 'danger'; statusText = '⚠️ 权重触发线'; }
    else if (absDev >= 3) { status = 'warn'; statusText = '📊 权重预警'; }
    else { status = 'ok'; statusText = '✓ 正常'; }
    return {
      code: p.code, name: p.name, targetWeight: p.targetWeight,
      costPrice: p.costPrice, qty: p.qty, cost: p.cost,
      cat: p.cat, catColor: p.catColor,
      close: p.close, changePct: p.changePct,
      marketValue: p.marketValue, pnl: p.pnl, pnlRate: p.pnlRate,
      currentWeight: +currentWeight.toFixed(2), deviation: +deviation.toFixed(1),
      status: status, statusText: statusText, totalMv: totalMv
    };
  });
}

function isMarketOpen() {
  var now = new Date();
  var day = now.getDay();
  if (day === 0 || day === 6) return false;
  var t = now.getHours() * 60 + now.getMinutes();
  return t >= 570 && t <= 900; // 9:30-15:00
}

function isTradingDay(date) {
  var d = date.getDay();
  return d !== 0 && d !== 6;
}

function getLastTradingDay() {
  var d = new Date();
  d.setDate(d.getDate() - 1);
  while (!isTradingDay(d)) d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

    '<div class="stat-card cash"><div class="stat-label">黄金 + 货基 + 待部署</div><div class="stat-value amber">' + fmt(otherTotal + pending,0) + '</div><div class="stat-change">黄金' + fmt(goldMv,0) + ' + 货基' + fmt(cargoMv,0) + ' + 待部署~' + fmt(pending,0) + '</div></div>';
}

function renderPieChart(positions) {
  if (pieChart) pieChart.destroy();
  var catMap = {};
  positions.forEach(function(p) {
    if (!catMap[p.cat]) catMap[p.cat] = { value: 0, color: p.catColor };
    catMap[p.cat].value += p.marketValue;
  });
  var filtered = Object.entries(catMap).filter(function(e) { return e[1].value > 0; });
  var ctx = document.getElementById('pieChart').getContext('2d');
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: filtered.map(function(e) { return e[0]; }),
      datasets: [{
        data: filtered.map(function(e) { return e[1].value; }),
        backgroundColor: filtered.map(function(e) { return e[1].color; }),
        borderColor: 'rgba(11,18,34,1)',
        borderWidth: 3,
        hoverBorderColor: 'rgba(201,169,110,0.6)',
        hoverBorderWidth: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#8899b4', padding: 14, font: { size: 12, family: "'PingFang SC','Microsoft YaHei',sans-serif" }, usePointStyle: true, pointStyleWidth: 8 } },
        tooltip: { callbacks: { label: function(ctx) { var total = ctx.dataset.data.reduce(function(a,b){return a+b;},0); return ctx.label + ': ¥' + ctx.raw.toLocaleString() + ' (' + ((ctx.raw/total)*100).toFixed(1) + '%)'; } } }
      }
    }
  });
}

function renderBarChart(positions) {
  if (barChart) barChart.destroy();
  function shortName(name) { return name.replace('华泰柏瑞','').replace('易方达','').replace('国泰上证','').replace('海富通中证','').replace('华安','').replace('南方',''); }
  var ctx = document.getElementById('barChart').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: positions.map(function(p) { return shortName(p.name); }),
      datasets: [
        { label: '目标权重', data: positions.map(function(p){return p.targetWeight;}), backgroundColor: 'rgba(201,169,110,0.5)', borderColor: 'rgba(201,169,110,0.8)', borderWidth: 1, borderRadius: 4, borderSkipped: false },
        { label: '当前权重', data: positions.map(function(p){return p.currentWeight;}), backgroundColor: 'rgba(96,165,250,0.5)', borderColor: 'rgba(96,165,250,0.8)', borderWidth: 1, borderRadius: 4, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { labels: { color: '#8899b4', font: { size: 12 }, usePointStyle: true, padding: 16 } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6d86', callback: function(v){ return v + '%'; }, font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { color: '#8899b4', font: { size: 11 } } }
      }
    }
  });
}

function renderDailyPnlChart(dailyData) {
  if (dailyChart) dailyChart.destroy();
  var ctx = document.getElementById('dailyPnlChart').getContext('2d');
  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dailyData.map(function(d) { return d.date.slice(5); }),
      datasets: [
        { type: 'bar', label: '每日盈亏', data: dailyData.map(function(d){return d.pnl;}),
          backgroundColor: dailyData.map(function(d){return d.pnl>=0?'rgba(52,211,153,0.5)':'rgba(248,113,113,0.5)';}),
          borderColor: dailyData.map(function(d){return d.pnl>=0?'rgba(52,211,153,0.8)':'rgba(248,113,113,0.8)';}),
          borderWidth: 1, borderRadius: 4, borderSkipped: false, order: 2, yAxisID: 'y' },
        { type: 'line', label: '累计盈亏', data: dailyData.map(function(d){return d.cumulative;}),
          borderColor: '#c9a96e', backgroundColor: 'rgba(201,169,110,0.1)', borderWidth: 2.5,
          pointRadius: 5, pointBackgroundColor: '#c9a96e', pointBorderColor: '#0b1222', pointBorderWidth: 2,
          pointHoverRadius: 8, tension: 0.35, fill: true, order: 1, yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8899b4', font: { size: 12 }, usePointStyle: true, padding: 16, pointStyleWidth: 8 } },
        tooltip: { callbacks: { label: function(ctx) { var v = ctx.raw; var prefix = v >= 0 ? '+' : ''; return ctx.dataset.label + ': ' + prefix + '¥' + v.toLocaleString('zh-CN', {minimumFractionDigits:0}); } } }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6d86', font: { size: 11 } } },
        y: { type: 'linear', position: 'left', title: { display: true, text: '每日盈亏 (元)', color: '#8899b4', font: { size: 11 } },
          grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6d86', font: { size: 10 }, callback: function(v){return (v>=0?'+':'')+(v/1000).toFixed(0)+'k';} } },
        y1: { type: 'linear', position: 'right', title: { display: true, text: '累计盈亏 (元)', color: '#c9a96e', font: { size: 11 } },
          grid: { drawOnChartArea: false }, ticks: { color: '#c9a96e', font: { size: 10 }, callback: function(v){return (v>=0?'+':'')+(v/1000).toFixed(0)+'k';} } }
      }
    }
  });
  // 更新日期范围
  var rangeEl = document.getElementById('pnlDateRange');
  if (rangeEl && dailyData.length > 0) {
    rangeEl.textContent = '数据区间：' + dailyData[0].date + ' 至 ' + dailyData[dailyData.length-1].date;
  }
}

function renderTransactions() {
  var txnBody = document.getElementById('txnBody');
  txnBody.innerHTML = '';
  var totalBuy = 0, totalSell = 0;
  transactions.forEach(function(t) {
    var isBuy = t.qty > 0;
    var badgeClass = isBuy ? 'buy' : 'sell';
    var directionLabel = isBuy ? '买入' : '卖出';
    if (isBuy) totalBuy += t.amount; else totalSell += Math.abs(t.amount);
    txnBody.innerHTML += '<tr>' +
      '<td class="txn-date">' + t.date + '</td>' +
      '<td><span class="txn-code-td">' + t.code + '</span></td>' +
      '<td class="txn-name-td"><span class="txn-row-badge ' + badgeClass + '"></span>' + t.name + ' <span style="font-size:10px;color:var(--text-muted)">' + directionLabel + '</span></td>' +
      '<td class="txn-price">¥' + t.price.toLocaleString('zh-CN',{minimumFractionDigits:3}) + '</td>' +
      '<td class="txn-qty">' + Math.abs(t.qty).toLocaleString() + '</td>' +
      '<td class="txn-amount-td" style="color:' + (isBuy ? 'var(--red)' : 'var(--green)') + '">' + (isBuy ? '' : '-') + '¥' + Math.abs(t.amount).toLocaleString('zh-CN',{minimumFractionDigits:0}) + '</td></tr>';
  });
  document.getElementById('txnSummary').innerHTML =
    '<span>共 <strong>' + transactions.length + '</strong> 笔交易</span>' +
    '<span>买入 <strong style="color:var(--red)">¥' + totalBuy.toLocaleString('zh-CN',{minimumFractionDigits:0}) + '</strong></span>' +
    '<span>卖出 <strong style="color:var(--green)">¥' + totalSell.toLocaleString('zh-CN',{minimumFractionDigits:0}) + '</strong></span>';
}

function renderDisciplineCards() {
  var grid = document.getElementById('disciplineGrid');
  grid.innerHTML = '';
  disciplineRules.forEach(function(r) {
    grid.innerHTML += '<div class="disc-card">' +
      '<div class="disc-card-header"><div class="disc-card-icon ' + r.iconClass + '">' + r.icon + '</div><div class="disc-card-title">' + r.title + '</div></div>' +
      '<div class="disc-card-body">' + r.body + '</div></div>';
  });
}

function updateDateBadge(dataDate, isLive) {
  var badge = document.getElementById('dateBadge');
  if (badge) badge.innerHTML = isLive ? '🟢 实时数据：' + dataDate : '📅 数据日期：' + dataDate;
  var footer = document.querySelector('.footer p');
  if (footer) footer.innerHTML = '⚠️ 投资有风险，本页面仅供记录参考，不构成投资建议 · 数据截止 ' + dataDate;
}

function updateStatusBar(state, text) {
  var dot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

function showLoading(show) {
  var bar = document.getElementById('loadingBar');
  if (show) bar.classList.add('active'); else bar.classList.remove('active');
  var btn = document.getElementById('refreshBtn');
  if (btn) {
    if (show) { btn.disabled = true; btn.classList.add('spinning'); }
    else { btn.disabled = false; btn.classList.remove('spinning'); }
  }
}

// ============================================================
//  DAILY SNAPSHOT
// ============================================================
function recordDailySnapshot(currentCumulative) {
  var history = loadDailyHistory();
  var today = todayStr();
  var existingIdx = -1;
  for (var i = 0; i < history.length; i++) {
    if (history[i].date === today) { existingIdx = i; break; }
  }
  if (existingIdx >= 0) {
    var prevCum = existingIdx > 0 ? history[existingIdx - 1].cumulative : 0;
    history[existingIdx].pnl = Math.round((currentCumulative - prevCum) * 100) / 100;
    history[existingIdx].cumulative = Math.round(currentCumulative * 100) / 100;
  } else {
    var prevCumulative = history.length > 0 ? history[history.length - 1].cumulative : 0;
    history.push({
      date: today,
      pnl: Math.round((currentCumulative - prevCumulative) * 100) / 100,
      cumulative: Math.round(currentCumulative * 100) / 100
    });
  }
  saveDailyHistory(history);
  return history;
}

// ============================================================
//  CORE: REFRESH DATA
// ============================================================
function refreshData(showLoadingFlag) {
  if (showLoadingFlag === undefined) showLoadingFlag = true;
  if (showLoadingFlag) showLoading(true);
  updateStatusBar('stale', '正在获取实时行情...');

  var codes = basePositions.map(function(p) { return p.code; });
  return fetchPrices(codes).then(function(prices) {
    if (!prices) {
      // API 失败：使用本地缓存，不执行 recordDailySnapshot 避免数据损坏
      updateStatusBar('error', '行情获取失败，显示本地数据');
      showLoading(false);
      var history = loadDailyHistory();
      renderDailyPnlChart(history);
      return null;
    }

    var positions = buildPositions(prices);
    positions = addWeightInfo(positions);
    var totalMv = positions.length > 0 ? positions[0].totalMv : 0;
    var totalPnl = positions.reduce(function(s, p) { return s + p.pnl; }, 0);

    var history = recordDailySnapshot(totalPnl);

    var now = new Date();
    var dataDate;
    var isLive = isMarketOpen();
    if (isLive || (now.getHours() >= 15 && isTradingDay(now))) {
      dataDate = todayStr();
    } else {
      dataDate = getLastTradingDay();
    }

    updateDateBadge(dataDate, isLive);
    renderStatsRow(positions, totalMv);
    renderPositionsTable(positions);
    renderPieChart(positions);
    renderBarChart(positions);
    renderDailyPnlChart(history);

    saveLastSnapshot({ date: dataDate, totalMv: totalMv, totalPnl: totalPnl, timestamp: Date.now() });

    if (isLive) {
      updateStatusBar('live', '实时行情中 · ' + now.toLocaleTimeString('zh-CN') + ' 更新 · 每5分钟自动刷新');
    } else {
      updateStatusBar('stale', '已收盘 · 显示最近交易日 ' + dataDate + ' 数据');
    }

    showLoading(false);
    return { positions: positions, totalMv: totalMv, totalPnl: totalPnl, prices: prices, history: history };
  }).catch(function(err) {
    console.error('刷新失败:', err);
    updateStatusBar('error', '行情获取失败，显示最近缓存数据 · ' + (err.message || '网络错误'));
    showLoading(false);

    // 尝试用缓存数据渲染
    var snapshot = loadLastSnapshot();
    if (snapshot) {
      updateDateBadge(snapshot.date || getLastTradingDay(), false);
    }
    // 用 localStorage 中的历史数据渲染图表
    var history = loadDailyHistory();
    renderDailyPnlChart(history);
    return null;
  });
}

// ============================================================
//  AUTO REFRESH
// ============================================================
var refreshTimer = null;
var nextRefreshLabel = document.getElementById('nextRefreshLabel');

function updateNextRefreshLabel() {
  if (!nextRefreshLabel) return;
  if (!isMarketOpen()) {
    nextRefreshLabel.textContent = '⏸ 非交易时间，暂停自动刷新';
    return;
  }
  var now = new Date();
  var next = new Date(now.getTime() + 5 * 60 * 1000);
  nextRefreshLabel.textContent = '⏱ 下次刷新：' + next.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function scheduleNextRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  updateNextRefreshLabel();

  if (!isMarketOpen()) {
    // 计算到下一个交易日的开盘时间
    var now = new Date();
    var next = new Date(now);
    next.setDate(next.getDate() + 1);
    while (!isTradingDay(next)) next.setDate(next.getDate() + 1);
    next.setHours(9, 31, 0, 0);
    var delay = next.getTime() - now.getTime();
    // 不超过12小时
    if (delay > 12 * 3600 * 1000) delay = 12 * 3600 * 1000;
    refreshTimer = setTimeout(function() {
      refreshData(true).then(function() { scheduleNextRefresh(); });
    }, delay);
    return;
  }
  // 交易时间：5分钟后刷新
  refreshTimer = setTimeout(function() {
    refreshData(true).then(function() { scheduleNextRefresh(); });
  }, 5 * 60 * 1000);
}

// ============================================================
//  MANUAL REFRESH
// ============================================================
function manualRefresh() {
  refreshData(true).then(function() {
    // 重置定时器
    if (refreshTimer) clearTimeout(refreshTimer);
    scheduleNextRefresh();
  });
}

// ============================================================
//  INIT
// ============================================================
function init() {
  // 渲染静态内容
  renderTransactions();
  renderDisciplineCards();

  // 先尝试用上次快照快速渲染
  var snapshot = loadLastSnapshot();
  if (snapshot) {
    updateDateBadge(snapshot.date || getLastTradingDay(), false);
  }

  // 用历史数据渲染图表（快速首屏）
  var history = loadDailyHistory();
  renderDailyPnlChart(history);

  // 异步获取实时数据
  refreshData(true).then(function(result) {
    if (result) {
      console.log('✅ 投资仪表盘已就绪 — ' + (isMarketOpen() ? '交易时间，每5分钟自动刷新' : '非交易时间'));
    }
    scheduleNextRefresh();

    // 如果在交易中，收盘后额外记录一次快照
    var now = new Date();
    var marketClose = new Date(now);
    marketClose.setHours(15, 2, 0, 0);
    if (now < marketClose && isTradingDay(now)) {
      var delay = marketClose.getTime() - now.getTime();
      setTimeout(function() {
        refreshData(false).then(function() {
          console.log('📊 收盘快照已保存:', todayStr());
        });
      }, delay);
    }
  });

  // 每秒更新下次刷新倒计时
  setInterval(updateNextRefreshLabel, 1000);

  // 动画
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.style.animationPlayState = 'running'; });
  }, { threshold: 0.1 });
  document.querySelectorAll('.animate-in').forEach(function(el) { observer.observe(el); });
}

document.addEventListener('DOMContentLoaded', init);
</script>
